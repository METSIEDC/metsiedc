<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | MET'S IEDC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f1115">
    <link rel="apple-touch-icon" href="assets/images/logos/MSEM.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@300;400;700;800;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Inter', 'sans-serif'],
                        display: ['Montserrat', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            background-color: #0f1115; /* Deep cinematic dark */
            color: #ffffff; 
            overflow-x: hidden; 
        }

        /* Monochromatic Glassmorphism */
        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px 0 rgba(0, 0, 0, 0.5);
            border-radius: 24px;
        }

        /* Input styling */
        .glass-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.4);
            outline: none;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
        }
        .glass-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        /* Loading Spinner */
        .spinner {
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top: 2px solid #000;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="font-sans antialiased relative min-h-screen flex items-center justify-center selection:bg-white selection:text-black pb-20 md:pb-0">

    <div id="pwa-update-banner" class="hidden fixed top-4 left-1/2 transform -translate-x-1/2 z-[9999] bg-[#181b21] border border-indigo-500/50 shadow-2xl shadow-black/50 rounded-full px-4 py-3 items-center gap-4 w-[90%] md:w-auto max-w-md transition-all duration-300">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-indigo-500/20 flex items-center justify-center text-indigo-400">
                <i class="fas fa-cloud-download-alt"></i>
            </div>
            <div class="flex flex-col">
                <span class="text-white text-sm font-semibold">Update Available</span>
                <span class="text-white/50 text-[10px] uppercase tracking-wider">New version ready</span>
            </div>
        </div>
        <button id="pwa-refresh-btn" class="ml-auto bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold px-4 py-2 rounded-full transition-colors">
            Refresh
        </button>
    </div>

    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[-20%] left-[-10%] w-[600px] h-[600px] rounded-full bg-white/5 filter blur-[120px]"></div>
        <div class="absolute bottom-[-20%] right-[-10%] w-[800px] h-[800px] rounded-full bg-white/5 filter blur-[150px]"></div>
    </div>

    <div class="w-full max-w-md px-4 relative z-10 flex flex-col items-center">
        
        <div class="text-center mb-10">
            <a href="index.html" class="inline-block mb-6 group">
                <div class="w-20 h-20 rounded-2xl bg-[#0a0c0f] border border-white/20 shadow-2xl flex items-center justify-center mx-auto overflow-hidden group-hover:border-white/40 transition-colors">
                    <img src="assets/images/logos/MSEM.jpg" alt="IEDC Logo" class="w-full h-full object-cover grayscale opacity-80" onerror="this.src='https://ui-avatars.com/api/?name=MI&background=0f1115&color=fff'">
                </div>
            </a>
            <h1 class="text-3xl font-display font-bold text-white tracking-widest uppercase mb-2">Admin Portal</h1>
            <p class="text-white/40 text-[10px] uppercase tracking-[0.2em] font-bold">MET'S IEDC Workspace</p>
        </div>

        <div class="glass-panel w-full p-8 md:p-10 border-t border-t-white/30">
            
            <div class="flex justify-center mb-8">
                <span class="inline-flex items-center gap-2 px-4 py-1.5 rounded bg-red-500/10 border border-red-500/20 text-red-400 text-[10px] font-bold uppercase tracking-widest">
                    <i class="fas fa-lock"></i> Restricted Access
                </span>
            </div>

            <div id="loginError" class="hidden mb-8 p-4 rounded text-xs tracking-wide text-center border font-medium bg-red-500/10 border-red-500/20 text-red-400 flex items-center justify-center gap-3">
                <i class="fas fa-exclamation-circle"></i>
                <span id="loginErrorText">Invalid credentials</span>
            </div>

            <form id="adminLoginForm" class="space-y-6">
                <div>
                    <label class="block text-[10px] font-bold text-white/50 mb-2 uppercase tracking-widest">Admin ID / Email</label>
                    <div class="relative">
                        <i class="fas fa-user-shield absolute left-4 top-1/2 transform -translate-y-1/2 text-white/30"></i>
                        <input type="email" id="adminEmail" placeholder="admin@metsiedc.in" class="glass-input w-full rounded py-4 pl-12 pr-4 text-sm font-light">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-white/50 mb-2 uppercase tracking-widest">Security Key</label>
                    <div class="relative">
                        <i class="fas fa-key absolute left-4 top-1/2 transform -translate-y-1/2 text-white/30"></i>
                        <input type="password" id="adminPassword" placeholder="••••••••••••" class="glass-input w-full rounded py-4 pl-12 pr-12 text-sm font-light">
                        <button type="button" class="toggle-password absolute right-4 top-1/2 transform -translate-y-1/2 text-white/30 hover:text-white transition-colors">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" id="loginBtn" class="w-full bg-white hover:bg-gray-200 text-[#0f1115] font-bold py-4 rounded text-[10px] uppercase tracking-widest transition-all shadow-xl flex justify-center items-center gap-3">
                        <span id="loginBtnText">Access Dashboard</span>
                        <div id="loginSpinner" class="spinner hidden"></div>
                        <i id="loginIcon" class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </form>

            <div class="mt-8 pt-6 border-t border-white/10 text-center">
                <a href="index.html" class="text-[9px] uppercase tracking-[0.2em] font-bold text-white/30 hover:text-white transition-colors flex items-center justify-center gap-2">
                    <i class="fas fa-arrow-left"></i> Return to Main Site
                </a>
            </div>
        </div>

        <p class="text-center text-white/30 text-[9px] uppercase tracking-widest mt-10 leading-relaxed max-w-xs">
            System monitored.<br>Unauthorized access is prohibited.<br>
            &copy; 2026 MET'S IEDC.
        </p>
    </div>

    <div class="fixed bottom-0 left-0 w-full bg-[#0a0c0f]/90 backdrop-blur-lg border-t border-white/10 z-[100] md:hidden pb-safe">
        <div class="flex justify-around items-center px-2 py-3">
            <a href="index.html" class="flex flex-col items-center gap-1 text-white/40 hover:text-white transition-colors">
                <i class="fas fa-home text-lg"></i>
                <span class="text-[9px] uppercase tracking-wider font-medium">Home</span>
            </a>
            <a href="event.html" class="flex flex-col items-center gap-1 text-white/40 hover:text-white transition-colors">
                <i class="far fa-calendar-alt text-lg"></i>
                <span class="text-[9px] uppercase tracking-wider font-medium">Events</span>
            </a>
            <a href="initiatives.html" class="flex flex-col items-center gap-1 text-white/40 hover:text-white transition-colors">
                <i class="fas fa-rocket text-lg"></i>
                <span class="text-[9px] uppercase tracking-wider font-medium">Initiatives</span>
            </a>
            <a href="login.html" class="flex flex-col items-center gap-1 text-white/40 hover:text-white transition-colors">
                <i class="far fa-user text-lg"></i>
                <span class="text-[9px] uppercase tracking-wider font-medium">Profile</span>
            </a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAIn9hB7Hx4Nwwk5Ar9bE3tFuo40VkBcc8",
            authDomain: "metsiedc-3010e.firebaseapp.com",
            databaseURL: "https://metsiedc-3010e-default-rtdb.firebaseio.com",
            projectId: "metsiedc-3010e",
            storageBucket: "metsiedc-3010e.firebasestorage.app",
            messagingSenderId: "954403413150",
            appId: "1:954403413150:web:2523a3377f15a3d6002f8f",
            measurementId: "G-6E7EK0D7JG"
        };

        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (e) {
            console.error("Firebase Init Error:", e);
            alert("Error initializing Firebase. Check console (F12).");
        }

        const loginForm = document.getElementById('adminLoginForm');
        const loginBtn = document.getElementById('loginBtn');
        const loginBtnText = document.getElementById('loginBtnText');
        const loginSpinner = document.getElementById('loginSpinner');
        const loginIcon = document.getElementById('loginIcon');
        const loginError = document.getElementById('loginError');
        const loginErrorText = document.getElementById('loginErrorText');

        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', function() {
                const input = this.parentElement.querySelector('input');
                const icon = this.querySelector('i');
                input.type = input.type === 'password' ? 'text' : 'password';
                icon.classList.toggle('fa-eye'); icon.classList.toggle('fa-eye-slash');
            });
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Keep session open but do nothing automatically
            }
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;

            if (!email || !password) {
                showError("Please enter both email and password.");
                return;
            }

            loginBtn.disabled = true;
            loginBtnText.textContent = "Verifying...";
            if(loginSpinner) loginSpinner.classList.remove('hidden');
            if(loginIcon) loginIcon.classList.add('hidden');
            loginError.classList.add('hidden');

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                const userDocRef = doc(db, "users", user.uid);
                const userDoc = await getDoc(userDocRef);
                
                if (userDoc.exists()) {
                    const userData = userDoc.data();

                    if (userData.role === 'admin') {
                        try {
                            await addDoc(collection(db, "logs"), {
                                action: "Admin Login",
                                details: "Successful login to Admin Portal",
                                admin: email,
                                timestamp: Date.now()
                            });
                        } catch (err) { console.error("Logging failed", err); }

                        window.location.href = 'admin-dashboard.html'; 
                    } else {
                        try {
                            await addDoc(collection(db, "logs"), {
                                action: "Unauthorized Access",
                                details: "Non-admin attempted to login to Admin Portal",
                                admin: email,
                                timestamp: Date.now()
                            });
                        } catch (err) { console.error("Logging failed", err); }

                        throw new Error("Access Denied: Your account does not have the 'admin' role.");
                    }
                } else {
                    try {
                        await addDoc(collection(db, "logs"), {
                            action: "Unauthorized Access",
                            details: "Unknown profile attempted to login",
                            admin: email,
                            timestamp: Date.now()
                        });
                    } catch (err) { console.error("Logging failed", err); }

                    throw new Error("Access Denied: User profile not found in database.");
                }

            } catch (error) {
                console.error("Login Error:", error);
                
                if (error.message.includes("Access Denied")) {
                    await signOut(auth);
                }

                let msg = "Authentication failed: " + error.message;
                if(error.code === 'auth/invalid-credential') msg = "Invalid email or password.";
                if(error.code === 'auth/user-not-found') msg = "User not found.";
                if(error.code === 'auth/wrong-password') msg = "Invalid password.";
                
                showError(msg);
                
                loginBtn.disabled = false;
                loginBtnText.textContent = "Access Dashboard";
                if(loginSpinner) loginSpinner.classList.add('hidden');
                if(loginIcon) loginIcon.classList.remove('hidden');
            }
        });

        function showError(msg) {
            loginErrorText.textContent = msg;
            loginError.classList.remove('hidden');
        }
    </script>

    <script>
        // Enhanced PWA Service Worker Registration & Update Logic
        let newWorker;
        const updateBanner = document.getElementById('pwa-update-banner');
        const refreshBtn = document.getElementById('pwa-refresh-btn');

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(registration => {
                    console.log('ServiceWorker registered');

                    // Check if there is an update waiting
                    registration.addEventListener('updatefound', () => {
                        newWorker = registration.installing;
                        newWorker.addEventListener('statechange', () => {
                            // If the new worker is installed and there's a previous worker, it's an update
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                // Show the update banner
                                updateBanner.classList.remove('hidden');
                                updateBanner.classList.add('flex');
                            }
                        });
                    });
                });

                // Listen for the controlling service worker to change, then reload the page
                let refreshing;
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    if (refreshing) return;
                    refreshing = true;
                    window.location.reload();
                });
            });
        }

        // Tell the new service worker to take over when the user clicks Refresh
        if (refreshBtn) {
            refreshBtn.addEventListener('click', () => {
                if (newWorker) {
                    newWorker.postMessage({ action: 'skipWaiting' });
                }
                updateBanner.classList.add('hidden'); // Hide banner immediately
            });
        }
    </script>
</body>
</html>
