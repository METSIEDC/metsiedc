    <!-- FIREBASE AND APP LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signOut, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, addDoc, deleteDoc, setDoc, query, onSnapshot, getDocs, increment, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        lucide.createIcons();
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzhv5--AImomPzvUOw1-fsnBom_YN5jDQq-8wd-L0xPg1J7AZAJumfBeXAEku4zd6I-/exec"; 
        
        // Use predefined firebase config if available in preview
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : { 
                apiKey: "AIzaSyAIn9hB7Hx4Nwwk5Ar9bE3tFuo40VkBcc8", 
                authDomain: "metsiedc-3010e.firebaseapp.com", 
                projectId: "metsiedc-3010e", 
                storageBucket: "metsiedc-3010e.firebasestorage.app", 
                messagingSenderId: "954403413150", 
                appId: "1:954403413150:web:2523a3377f15a3d6002f8f" 
            };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // REMOVED THE ARTIFACT WRAPPERS - NOW POINTING TO FIRESTORE ROOT
        const getCol = (name) => collection(db, name);
        const getDocRef = (name, id) => doc(db, name, id);

        window.allUsersData = []; 
        window.projectsData = [];
        window.fundsData = [];
        window.fundsBalance = 0;
        window.excomMeetingsData = []; 
        window.currentUserEmail = ""; 
        window.db = db;
        
        // Utilities
        window.logActivity = async (action, details) => {
            try {
                await addDoc(getCol("logs"), {
                    action: action,
                    details: details,
                    admin: window.currentUserEmail || 'System',
                    timestamp: Date.now()
                });
            } catch (e) {
                console.error("Failed to log activity:", e);
            }
        };

        window.sendAutomatedEmail = async (email, name, event, url) => {
            console.log(`Mock Email sent to ${email} for ${event}`);
        };

        window.sendAutomatedWhatsApp = async (phone, msg) => {
            console.log(`Mock WhatsApp sent to ${phone}: ${msg}`);
        };

        window.openGlobalScanner = (type) => {
            window.showToast("Scanner initialized: " + type, "info");
            document.getElementById('globalScannerModal').classList.remove('hidden');
        };

        window.closeGlobalScanner = () => {
            document.getElementById('globalScannerModal').classList.add('hidden');
        };

        window.toggleFeatureStatus = async (id, currentStatus) => {
            try {
                const newStatus = currentStatus === 'Active' ? 'Draft' : 'Active';
                await updateDoc(getDocRef("features", id), { status: newStatus });
                await window.logActivity("Feature Toggled", `Feature changed to ${newStatus}`);
            } catch(e) {
                window.showToast("Failed to toggle feature: " + e.message, "error");
            }
        };

        window.fulfillReward = async (id, phone, name, item, userId) => {
            if(!(await customConfirm(`Mark ${item} as fulfilled for ${name}?`))) return;
            try {
                await updateDoc(getDocRef("redemptions", id), { status: 'Fulfilled' });
                await window.logActivity("Reward Fulfilled", `Fulfilled ${item} for ${name}`);
                window.showToast("Reward Fulfilled", "success");
            } catch(e) {
                window.showToast("Error: " + e.message, "error");
            }
        };

        window.refundReward = async (id, userId, cost) => {
            if(!(await customConfirm(`Refund ${cost} points to this user?`))) return;
            try {
                await updateDoc(getDocRef("redemptions", id), { status: 'Refunded' });
                await updateDoc(getDocRef("users", userId), { points: increment(cost) });
                await window.logActivity("Reward Refunded", `Refunded ${cost} pts`);
                window.showToast("Refunded successfully", "success");
            } catch(e) {
                window.showToast("Error: " + e.message, "error");
            }
        };

        window.prepareEditUser = (id, name, role) => {
            document.getElementById('editUserId').value = id;
            document.getElementById('editUserName').textContent = name;
            document.getElementById('editUserRole').value = role || 'student';
            window.toggleEditUserModal(true);
        };

        window.updateKanbanStatus = async (projectId, newStatus) => {
            await updateDoc(getDocRef("projects", projectId), { status: newStatus });
            await logActivity("Pipeline Updated", `Project moved to ${newStatus}`);
        };
        
        let roleChartInstance = null; 
        let activityChartInstance = null;

        // --- AUTH LOGIC ---
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth Error", error);
                if (error.code === 'auth/admin-restricted-operation') {
                    window.showToast("Anonymous Auth is disabled in your Firebase console.", "error");
                } else {
                    window.showToast("Authentication Failed: " + error.message, "error");
                }
            }
        };
        initAuth();

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                window.currentUserEmail = user.email || 'Admin Demo'; 
                document.getElementById('adminEmailDisplay').textContent = window.currentUserEmail; 
                
                // Demo logic: Create fake admin user doc if doesn't exist to prevent UI crashes in preview
                const userDocRef = getDocRef("users", user.uid);
                try {
                    const snap = await getDoc(userDocRef);
                    if(!snap.exists() || snap.data().role !== 'admin') {
                        await setDoc(userDocRef, { role: 'admin', email: window.currentUserEmail, name: 'Admin user' }, { merge: true });
                    }
                } catch(e) {}
                
                initSync();
                window.renderFormBuilderFields();
            } else { 
                window.showToast("Signed Out", "error");
            }
        });

        // Form Resets & Handle submits
        const bindForm = (id, collection, payloadFn, msg) => {
            const form = document.getElementById(id);
            if(form) form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = e.target.querySelector('button[type="submit"]');
                const oldTxt = btn.innerText;
                btn.disabled = true; btn.innerText = "Processing...";
                try {
                    await addDoc(getCol(collection), { ...payloadFn(), timestamp: Date.now() });
                    window.showToast(msg, "success");
                    e.target.reset();
                } catch(err) {
                    window.showToast(err.message, "error");
                } finally {
                    btn.disabled = false; btn.innerText = oldTxt;
                }
            });
        }
        
        bindForm('featureManagerForm', 'features', () => ({
            title: document.getElementById('fmTitle').value,
            description: document.getElementById('fmDescription').value,
            target: document.getElementById('fmTarget').value,
            status: document.getElementById('fmStatus').value
        }), "Feature deployed!");
        
        bindForm('pushAlertForm', 'alerts', () => ({
            title: document.getElementById('alertTitle').value,
            category: document.getElementById('alertCategory').value,
            content: document.getElementById('alertContent').value
        }), "Alert broadcasted!");
        
        bindForm('announcementForm', 'announcements', () => ({
            title: document.getElementById('annTitle').value,
            content: document.getElementById('annContent').value
        }), "Circular published!");
        
        bindForm('newsForm', 'news', () => ({
            title: document.getElementById('newsTitle').value,
            content: document.getElementById('newsContent').value,
            date: document.getElementById('newsDate').value
        }), "News published!");
        
        bindForm('galleryForm', 'gallery', () => ({
            title: document.getElementById('galleryTitle').value,
            date: document.getElementById('galleryDate').value
        }), "Gallery created!");

        document.getElementById('editUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editUserId').value;
            const role = document.getElementById('editUserRole').value;
            try {
                await updateDoc(getDocRef("users", id), { role: role });
                await window.logActivity("User Updated", `Role changed to ${role} for ${id}`);
                window.showToast("User role updated successfully", "success");
                window.toggleEditUserModal(false);
            } catch (err) {
                window.showToast(err.message, "error");
            }
        });

        document.getElementById('adminAddUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitAddUserBtn');
            btn.disabled = true; btn.innerText = "Processing...";
            try {
                const name = document.getElementById('newUserName').value;
                const email = document.getElementById('newUserEmail').value;
                const uid = document.getElementById('newUserUid').value || generateId();
                await setDoc(getDocRef("users", uid), { name, email, role: 'student', points: 0, timestamp: Date.now() });
                window.showToast("User added successfully", "success");
                window.toggleAddUserModal(false);
                e.target.reset();
            } catch(e) {
                window.showToast(e.message, "error");
            } finally {
                btn.disabled = false; btn.innerText = "Add User";
            }
        });

        // --- MASTER SYNC LOGIC ---
        function initSync() {
            // 1. Users Sync
            onSnapshot(getCol("users"), (snap) => {
                let uHtml = '', pointsHtml = '', certHtml = '', attHtml = '', excomModalHtml = '', excomHtml = '';
                let usersList = []; 
                let studentCount = 0, excomCount = 0, adminCount = 0;
                
                document.getElementById('totalUsersCount').textContent = snap.size;
                safeSetText('directoryUserCount', snap.size);

                snap.forEach(d => {
                    const data = d.data(); 
                    usersList.push({ id: d.id, ...data });
                    if(data.role === 'admin') adminCount++; 
                    else if(data.role === 'excom') excomCount++; 
                    else studentCount++;
                });
                
                window.allUsersData = usersList;
                
                // Chart Generation
                if(roleChartInstance) roleChartInstance.destroy();
                const ctxRole = document.getElementById('roleChart');
                if(ctxRole && (studentCount > 0 || excomCount > 0 || adminCount > 0)) {
                    roleChartInstance = new Chart(ctxRole, { 
                        type: 'doughnut', 
                        data: { 
                            labels: ['Students', 'ExCom', 'Admins'], 
                            datasets: [{ 
                                data: [studentCount, excomCount, adminCount], 
                                backgroundColor: ['#2563eb', '#9333ea', '#ef4444'], 
                                borderWidth: 0 
                            }] 
                        }, 
                        options: { cutout: '75%', plugins: { legend: { position: 'bottom' } } } 
                    });
                }

                usersList.sort((a,b) => (b.points || 0) - (a.points || 0));
                
                usersList.forEach(u => {
                    const safeName = escapeHTML(u.name || "Unknown"); 
                    const safeEmail = escapeHTML(u.email || "No Email");
                    let safePhone = u.phone ? escapeHTML(u.phone) : "No Phone";
                    
                    const isGoogle = u.authProvider === 'google' || u.googleLogin === true;
                    const authBadge = isGoogle 
                        ? `<span class="bg-white/10 text-white px-2 py-0.5 rounded text-[8px] uppercase tracking-widest flex items-center gap-1 w-max mt-1 border border-white/20"><i class="fab fa-google"></i> Google</span>`
                        : `<span class="bg-white/5 text-white/50 px-2 py-0.5 rounded text-[8px] uppercase tracking-widest flex items-center gap-1 w-max mt-1 border border-white/10"><i class="fas fa-envelope"></i> Email</span>`;
                    
                    const points = u.points || 0;
                    
                    let roleBadge = `<span class="px-2 py-1 bg-white/10 text-[9px] rounded-md uppercase font-bold text-white/80 border border-white/10">Student</span>`;
                    if(u.role === 'admin') roleBadge = `<span class="px-2 py-1 bg-red-500/10 text-red-400 text-[9px] rounded-md uppercase font-bold border border-red-500/30">Admin</span>`;
                    else if(u.role === 'excom') roleBadge = `<span class="px-2 py-1 bg-glow-purple/10 text-glow-purple text-[9px] rounded-md uppercase font-bold border border-glow-purple/30">ExCom</span>`;

                    let statusBadge = !u.disabled 
                        ? `<span class="px-2 py-1 bg-green-500/10 text-green-400 text-[9px] rounded-md uppercase font-bold border border-green-500/30">Active</span>`
                        : `<span class="px-2 py-1 bg-yellow-500/10 text-yellow-500 text-[9px] rounded-md uppercase font-bold border border-yellow-500/30">Disabled</span>`;

                    const toggleStatusColor = !u.disabled ? 'text-yellow-500 hover:bg-yellow-500/20' : 'text-green-400 hover:bg-green-500/20';
                    const toggleIcon = !u.disabled ? 'user-minus' : 'user-check';

                    // USER DIRECTORY HTML
                    uHtml += `
                    <tr class="border-b border-white/5 hover:bg-white/5 transition-colors text-sm font-light text-white/90">
                        <td class="px-4 py-4 text-center">
                            <input type="checkbox" class="user-select-cb custom-checkbox" value="${u.id}">
                        </td>
                        <td class="px-6 py-4 font-medium text-white">${safeName}</td>
                        <td class="px-6 py-4">
                            <div class="text-sm text-white/80">${safeEmail}</div>
                            <div class="flex items-center gap-2 mt-1">
                                <div class="text-[10px] text-white/40 font-mono">
                                    <i class="fab fa-whatsapp mr-1 text-green-500/70"></i> ${safePhone}
                                </div>
                                <button onclick="openEditPhone('${u.id}', '${safeName}', '${safePhone}')" class="text-white/30 hover:text-white transition-colors">
                                    <i data-lucide="pencil" class="w-3 h-3"></i>
                                </button>
                            </div>
                            ${authBadge}
                        </td>
                        <td class="px-6 py-4 text-center">${roleBadge}</td>
                        <td class="px-6 py-4 text-center">${statusBadge}</td>
                        <td class="px-6 py-4 text-center flex justify-center gap-2 items-center">
                            <button onclick="prepareEditUser('${u.id}', '${safeName}', '${u.role||'student'}')" class="text-glow-blue bg-white/5 hover:bg-white/10 p-2 rounded-lg transition-colors">
                                <i data-lucide="edit-2" class="w-4 h-4"></i>
                            </button>
                            <button onclick="toggleUserStatus('${u.id}', ${!!u.disabled})" class="${toggleStatusColor} bg-white/5 p-2 rounded-lg transition-colors">
                                <i data-lucide="${toggleIcon}" class="w-4 h-4"></i>
                            </button>
                            <button onclick="deleteUser('${u.id}', '${safeName}')" class="text-red-400 bg-red-500/10 hover:bg-red-500/20 p-2 rounded-lg transition-colors">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </td>
                    </tr>`;

                    // POINTS HTML
                    pointsHtml += `
                    <tr class="border-b border-white/5 hover:bg-white/5 transition-colors text-sm font-light text-white/90">
                        <td class="px-6 py-4 font-medium text-white">${safeName}</td>
                        <td class="px-6 py-4 text-xs text-white/60 font-mono">
                            ${safeEmail}<br>
                            <span class="text-[9px] text-white/30">ID: ${u.id}</span>
                        </td>
                        <td class="px-6 py-4 text-center text-glow-gold font-display font-black text-xl">${points}</td>
                        <td class="px-6 py-4 flex justify-center gap-2">
                            <button onclick="preparePointsAction('${u.id}', '${safeName}', 'add')" class="bg-green-500/10 hover:bg-green-500/20 border border-green-500/30 text-green-400 p-2 rounded-lg transition-colors flex items-center gap-1 text-[10px] font-bold uppercase">
                                <i data-lucide="plus" class="w-3 h-3"></i> Add
                            </button>
                            <button onclick="preparePointsAction('${u.id}', '${safeName}', 'deduct')" class="bg-red-500/10 hover:bg-red-500/20 border border-red-500/30 text-red-400 p-2 rounded-lg transition-colors flex items-center gap-1 text-[10px] font-bold uppercase">
                                <i data-lucide="minus" class="w-3 h-3"></i> Deduct
                            </button>
                        </td>
                    </tr>`;

                    if(u.role === 'student' || u.role === 'excom') {
                        certHtml += `
                        <tr class="border-b border-white/5 hover:bg-white/5">
                            <td class="px-6 py-4 text-center">
                                <input type="checkbox" class="cert-checkbox custom-checkbox" value="${u.id}" data-name="${safeName}" data-email="${safeEmail}" data-phone="${safePhone}">
                            </td>
                            <td class="text-sm font-medium text-white">${safeName}</td>
                        </tr>`;
                        
                        attHtml += `
                        <tr class="border-b border-white/5 hover:bg-white/5 cursor-pointer" onclick="toggleAttCheck('${u.id}')">
                            <td class="px-6 py-4 text-center">
                                <input type="checkbox" class="att-checkbox custom-checkbox" id="att-${u.id}" value="${u.id}" data-name="${safeName}">
                            </td>
                            <td class="text-sm font-bold text-white">${safeName}</td>
                            <td class="text-xs text-white/50">${safeEmail}</td>
                        </tr>`;
                    }
                    
                    if(u.role === 'excom') {
                        excomHtml += `
                        <div class="flex justify-between items-center bg-white/5 border border-white/10 p-4 rounded-xl mb-3">
                            <span class="font-bold text-sm text-white">${safeName}</span>
                            <span class="text-[9px] font-bold text-glow-purple border border-glow-purple/30 bg-glow-purple/10 px-3 py-1.5 rounded-md">ExCom</span>
                        </div>`;
                        
                        excomModalHtml += `
                        <tr class="hover:bg-white/5">
                            <td class="px-6 py-3 border-r border-white/10 text-center">
                                <select class="excom-status-select glass-input text-[10px] uppercase font-bold py-2.5 px-3 rounded-lg w-full text-center" data-id="${u.id}" data-name="${safeName}">
                                    <option value="Absent" class="text-red-400">Absent</option>
                                    <option value="Present" class="text-green-400">Present</option>
                                    <option value="Informed" class="text-yellow-400">Informed</option>
                                </select>
                            </td>
                            <td class="text-sm font-bold text-white px-6">${safeName}</td>
                        </tr>`;
                    }
                });
                
                if(document.getElementById('userListBody')) document.getElementById('userListBody').innerHTML = uHtml;
                if(document.getElementById('pointsListBody')) document.getElementById('pointsListBody').innerHTML = pointsHtml;
                if(document.getElementById('certUserListBody')) document.getElementById('certUserListBody').innerHTML = certHtml;
                if(document.getElementById('attendanceListBody')) document.getElementById('attendanceListBody').innerHTML = attHtml;
                if(document.getElementById('excomMembersList')) document.getElementById('excomMembersList').innerHTML = excomHtml;
                if(document.getElementById('excomAttendanceList')) document.getElementById('excomAttendanceList').innerHTML = excomModalHtml;
                lucide.createIcons();
            }, (err) => console.error("Users Sync Error:", err));

            // 2. KANBAN & PROJECTS SYNC
            onSnapshot(getCol("projects"), (snap) => {
                window.projectsData = [];
                let pendingHtml = '', apprHtml = '', protoHtml = '', fundHtml = '', incHtml = '';
                let pCount=0, aCount=0, prCount=0, fCount=0, iCount=0;
                
                let rawList = [];
                snap.forEach(d => rawList.push({id: d.id, ...d.data()}));
                rawList.sort((a,b) => (b.timestamp||0) - (a.timestamp||0));

                rawList.forEach(p => {
                    window.projectsData.push(p);
                    
                    const status = p.status || 'Pending Review';
                    let aiBadge = p.aiFeedback ? `<span class="ml-2 text-[8px] bg-glow-blue/20 text-glow-blue px-2 py-0.5 rounded border border-glow-blue/30"><i class="fas fa-sparkles"></i> AI</span>` : "";
                    
                    const card = `
                    <div class="kanban-card bg-black/60 border border-white/10 p-4 rounded-xl hover:border-glow-purple/50 transition-colors" id="card-${p.id}" draggable="true" ondragstart="drag(event)">
                        <div class="flex justify-between items-start mb-2">
                            <h4 class="font-bold text-white text-sm leading-tight">${p.title}</h4>
                        </div>
                        <div class="flex items-center gap-2 mb-3">
                            <span class="text-[9px] text-white/50 uppercase tracking-widest font-mono bg-white/5 px-2 py-0.5 rounded border border-white/10">${p.tech}</span>
                            ${aiBadge}
                        </div>
                        <p class="text-[10px] text-white/40 line-clamp-2 leading-relaxed mb-3">${p.desc}</p>
                        <div class="text-[8px] text-white/30 text-right">UID: ${p.uid ? p.uid.substring(0,8) : 'Unknown'}...</div>
                    </div>`;

                    if(status === 'Pending Review') { pendingHtml += card; pCount++; }
                    else if(status === 'Approved') { apprHtml += card; aCount++; }
                    else if(status === 'Prototyping') { protoHtml += card; prCount++; }
                    else if(status === 'Funded') { fundHtml += card; fCount++; }
                    else if(status === 'Incubated') { incHtml += card; iCount++; }
                });
                
                if(document.getElementById('col-Pending Review')) {
                    document.getElementById('col-Pending Review').innerHTML = pendingHtml; document.getElementById('count-pending').textContent = pCount;
                    document.getElementById('col-Approved').innerHTML = apprHtml; document.getElementById('count-approved').textContent = aCount;
                    document.getElementById('col-Prototyping').innerHTML = protoHtml; document.getElementById('count-prototyping').textContent = prCount;
                    document.getElementById('col-Funded').innerHTML = fundHtml; document.getElementById('count-funded').textContent = fCount;
                    document.getElementById('col-Incubated').innerHTML = incHtml; document.getElementById('count-incubated').textContent = iCount;
                    safeSetText('overviewStartups', aCount+prCount+fCount+iCount); 
                }
            }, (err) => console.error("Projects Sync Error:", err));

            // 3. FUNDS & GRANTS SYNC
            onSnapshot(getCol("funds"), (snap) => {
                window.fundsData = [];
                let rawList = [];
                snap.forEach(d => rawList.push({id: d.id, ...d.data()}));
                rawList.sort((a,b) => (b.timestamp||0) - (a.timestamp||0));

                let h = '', inc = 0, exp = 0;
                
                rawList.forEach(f => {
                    window.fundsData.push(f);
                    const color = f.type === 'Income' ? 'text-green-400' : 'text-red-400';
                    const sign = f.type === 'Income' ? '+' : '-';
                    
                    if(f.type === 'Income') inc += parseFloat(f.amount); 
                    else exp += parseFloat(f.amount);
                    
                    h += `
                    <tr class="border-b border-white/5 hover:bg-white/5">
                        <td class="px-6 py-4 text-[10px] font-mono text-white/50">${new Date(f.timestamp).toLocaleDateString()}</td>
                        <td class="px-6 py-4 text-white text-sm">${f.desc}</td>
                        <td class="px-6 py-4 text-right font-bold font-mono ${color}">${sign}₹${f.amount}</td>
                    </tr>`;
                });
                
                window.fundsBalance = inc - exp;
                safeSetText('fundTotalIncome', inc.toLocaleString());
                safeSetText('fundTotalExpense', exp.toLocaleString());
                safeSetText('fundBalance', window.fundsBalance.toLocaleString());
                safeSetText('overviewFunds', window.fundsBalance.toLocaleString()); 
                
                if(document.getElementById('fundsListBody')) {
                    document.getElementById('fundsListBody').innerHTML = h || '<tr><td colspan="3" class="text-center py-8 text-white/30">No records found.</td></tr>';
                }
            }, (err) => console.error("Funds Sync Error:", err));

            // 4. QUESTS ENGINE SYNC
            onSnapshot(getCol("quests"), (snap) => {
                let h = '';
                snap.forEach(d => {
                    const q = d.data();
                    h += `
                    <div class="glass-panel p-6 rounded-2xl flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-glow-orange/20">
                        <div>
                            <div class="flex items-center gap-3 mb-2">
                                <i class="fas fa-gem text-glow-orange text-xl"></i>
                                <h4 class="font-bold text-white text-lg">${q.title}</h4>
                            </div>
                            <p class="text-xs text-white/50">${q.desc}</p>
                        </div>
                        <div class="flex flex-col items-end gap-2 shrink-0">
                            <span class="text-xl font-display font-black text-glow-gold">+${q.reward} <span class="text-[10px]">PTS</span></span>
                            <button onclick="deleteDoc(window.doc(window.db,'artifacts','${appId}','public','data','quests','${d.id}'))" class="text-[9px] uppercase tracking-widest text-red-400 hover:text-white transition-colors">Delete Quest</button>
                        </div>
                    </div>`;
                });
                if(document.getElementById('questsListBody')) {
                    document.getElementById('questsListBody').innerHTML = h || '<div class="glass-panel p-10 text-center text-white/30 text-xs font-bold uppercase tracking-widest">No active quests.</div>';
                }
            }, (err) => console.error("Quests Sync Error:", err));

            // 5. Features Sync
            onSnapshot(getCol("features"), (snap) => {
                let html = '';
                if(snap.empty) {
                    html = '<div class="text-center py-6 text-white/30 text-[10px] uppercase font-bold tracking-widest border border-dashed border-white/10 rounded-xl">No active features found.</div>';
                }
                snap.forEach(d => {
                    const f = d.data();
                    const statusColor = f.status === 'Active' ? 'text-green-400 bg-green-500/10 border-green-500/30' : 'text-yellow-400 bg-yellow-500/10 border-yellow-500/30';
                    html += `
                    <div class="bg-black/30 border border-white/10 p-5 rounded-2xl flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 transition-colors hover:border-white/20">
                        <div>
                            <div class="flex items-center gap-3 mb-1">
                                <h4 class="font-bold text-white text-sm">${f.title}</h4>
                                <span class="px-2 py-0.5 rounded text-[8px] uppercase tracking-widest font-bold border ${statusColor}">${f.status}</span>
                                <span class="px-2 py-0.5 rounded text-[8px] uppercase tracking-widest font-bold bg-white/5 text-white/50 border border-white/10">${f.target}</span>
                            </div>
                            <p class="text-xs text-white/50">${f.description}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="toggleFeatureStatus('${d.id}', '${f.status}')" class="bg-white/5 hover:bg-white/10 border border-white/10 text-white p-2 rounded-lg transition-colors text-[10px] uppercase font-bold tracking-widest">
                                <i data-lucide="power" class="w-4 h-4"></i>
                            </button>
                            <button onclick="deleteDoc(window.doc(window.db,'artifacts','${appId}','public','data','features','${d.id}'))" class="bg-red-500/10 hover:bg-red-500/20 border border-red-500/30 text-red-400 p-2 rounded-lg transition-colors">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>`;
                });
                if(document.getElementById('featuresListBody')) {
                    document.getElementById('featuresListBody').innerHTML = html;
                }
                lucide.createIcons();
            }, (err) => console.error("Features Sync Error:", err));

            // 6. Ticket Orders (Redemptions) Sync
            onSnapshot(getCol("redemptions"), (snap) => {
                let h = '';
                if(snap.empty) { 
                    h = '<tr><td colspan="5" class="text-center py-10 text-white/30 text-xs uppercase font-bold tracking-widest">No orders yet.</td></tr>'; 
                }
                let rawList = [];
                snap.forEach(d => rawList.push({id:d.id, ...d.data()}));
                rawList.sort((a,b) => (b.timestamp||0) - (a.timestamp||0));

                rawList.forEach(r => {
                    let badge = `<span class="px-2 py-1 rounded text-[9px] uppercase font-bold border border-yellow-500/30 bg-yellow-500/10 text-yellow-400">Pending</span>`;
                    if(r.status === 'Fulfilled') badge = `<span class="px-2 py-1 rounded text-[9px] uppercase font-bold border border-green-500/30 bg-green-500/10 text-green-400">Approved</span>`;
                    if(r.status === 'Refunded') badge = `<span class="px-2 py-1 rounded text-[9px] uppercase font-bold border border-red-500/30 bg-red-500/10 text-red-400">Refunded</span>`;

                    let actions = '';
                    if(r.status === 'Pending') {
                        actions = `
                        <button onclick="fulfillReward('${r.id}', '${r.userPhone}', '${r.userName}', '${r.itemName}', '${r.userId}')" class="bg-green-500/10 hover:bg-green-500/20 text-green-400 border border-green-500/30 p-2 rounded-lg transition-colors">
                            <i class="fas fa-check w-4 h-4"></i>
                        </button>
                        <button onclick="refundReward('${r.id}', '${r.userId}', ${r.cost})" class="bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/30 p-2 rounded-lg transition-colors">
                            <i class="fas fa-undo w-4 h-4"></i>
                        </button>`;
                    } else if (r.status === 'Fulfilled' && r.ticketId) {
                        actions = `<span class="text-[10px] text-white/50 font-mono font-bold tracking-wider">${r.ticketId}</span>`;
                    }
                    
                    h += `
                    <tr class="border-b border-white/5 hover:bg-white/5 transition-colors text-sm">
                        <td class="px-6 py-4 text-white font-medium">${r.userName}</td>
                        <td class="px-6 py-4 text-white/80">${r.itemName} <span class="text-glow-gold text-[10px] ml-1 font-bold">(${r.cost} pts)</span></td>
                        <td class="px-6 py-4 text-white/50 text-[10px] font-mono">${new Date(r.timestamp).toLocaleDateString()}</td>
                        <td class="px-6 py-4">${badge}</td>
                        <td class="px-6 py-4 flex justify-center gap-2">${actions}</td>
                    </tr>`;
                });
                if(document.getElementById('redemptionsList')) {
                    document.getElementById('redemptionsList').innerHTML = h;
                }
            }, (err) => console.error("Redemptions Sync Error:", err));

            // 7. Attendance Chart Sync
            onSnapshot(getCol("attendance"), (snap) => {
                let activityLog = []; 
                snap.forEach(d => activityLog.push(d.data()));
                activityLog.sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
                let chartDataMap = {};
                
                activityLog.slice(0, 50).reverse().forEach(log => { 
                    if(log.timestamp) { 
                        const dateString = new Date(log.timestamp).toLocaleDateString(undefined, {month: 'short', day:'numeric'}); 
                        chartDataMap[dateString] = (chartDataMap[dateString] || 0) + 1; 
                    } 
                });
                
                const labels = Object.keys(chartDataMap); 
                const dataPoints = Object.values(chartDataMap);
                
                if(activityChartInstance) activityChartInstance.destroy();
                const ctxAct = document.getElementById('activityChart');
                
                if(ctxAct && labels.length > 0) {
                    activityChartInstance = new Chart(ctxAct, { 
                        type: 'line', 
                        data: { 
                            labels: labels, 
                            datasets: [{ 
                                data: dataPoints, 
                                borderColor: '#2563eb', 
                                backgroundColor: 'rgba(37, 99, 235, 0.2)', 
                                borderWidth: 3, 
                                fill: true, 
                                tension: 0.4 
                            }] 
                        }, 
                        options: { 
                            responsive: true, 
                            maintainAspectRatio: false, 
                            plugins: { legend: { display: false } }, 
                            scales: { y: { beginAtZero: true }, x: { grid: { display: false } } } 
                        } 
                    });
                }
            }, (err) => console.error("Attendance Sync Error:", err));

            // 8. Inventory Sync
            onSnapshot(getCol("inventory"), (snap) => {
                let h='', total=0, avail=0, borrowed=0;
                
                snap.forEach(d => {
                    const id = d.id; 
                    const item = d.data(); 
                    total++; 
                    if(item.status === 'Available') avail++; 
                    else borrowed++;
                    
                    const btn = item.status === 'Available' 
                        ? `<button onclick="toggleItemStatus('${id}', 'Borrowed')" class="bg-white/5 border border-white/20 px-4 py-2 rounded-lg text-[9px] uppercase font-bold text-white hover:bg-white/10 transition-colors">Lend</button>` 
                        : `<button onclick="toggleItemStatus('${id}', 'Available')" class="bg-white text-black px-4 py-2 rounded-lg text-[9px] uppercase font-bold hover:bg-gray-200 transition-colors">Return</button>`;
                        
                    const statusBadge = item.status === 'Available' 
                        ? `<span class="text-[9px] uppercase tracking-widest px-3 py-1.5 rounded border border-green-500/30 text-green-400 bg-green-500/10 font-bold">${item.status}</span>` 
                        : `<span class="text-[9px] uppercase tracking-widest px-3 py-1.5 rounded border border-red-500/30 text-red-400 bg-red-500/10 font-bold">${item.status}</span>`;
                    
                    h += `
                    <tr class="border-b border-white/5 hover:bg-white/5 text-sm font-light text-white/90">
                        <td class="px-6 py-4 font-bold text-white">${item.name}</td>
                        <td class="text-[10px] text-white/50 uppercase tracking-widest px-6">${item.category}</td>
                        <td class="px-6">${statusBadge}</td>
                        <td class="text-sm text-white/60 px-6">${item.holder||'-'}</td>
                        <td class="text-center flex justify-center gap-4 py-4 px-6">
                            ${btn}
                            <button onclick="deleteDoc(window.doc(window.db,'artifacts','${appId}','public','data','inventory','${id}'))" class="text-red-400 bg-red-500/10 hover:bg-red-500/20 p-2 rounded-lg transition-colors">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </td>
                    </tr>`;
                });
                
                if(document.getElementById('inventoryListBody')) document.getElementById('inventoryListBody').innerHTML = h;
                safeSetText('invTotalOverview', total); 
                safeSetText('invTotal', total); 
                safeSetText('invAvail', avail); 
                safeSetText('invBorrowed', borrowed);
                lucide.createIcons();
            }, (err) => console.error("Inventory Sync Error:", err));

            // 9. System Logs Sync
            onSnapshot(getCol("logs"), (snap) => {
                let h = ''; 
                let rawList = [];
                snap.forEach(d => rawList.push(d.data()));
                rawList.sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
                
                rawList.slice(0, 50).forEach(l => { 
                    h += `
                    <tr class="border-b border-white/5 hover:bg-white/5 text-sm">
                        <td class="px-6 py-4 text-white/50 font-mono text-[10px]">${new Date(l.timestamp).toLocaleString()}</td>
                        <td class="text-white font-bold uppercase tracking-widest text-[10px] px-6">${l.action}</td>
                        <td class="text-white/70 px-6 font-light">${l.details}</td>
                        <td class="text-white/40 font-mono px-6 text-[10px]">${l.admin}</td>
                    </tr>`; 
                });
                if(document.getElementById('logsListBody')) document.getElementById('logsListBody').innerHTML = h;
            }, (err) => console.error("Logs Sync Error:", err));

            // 10. ExCom Meetings Sync
            onSnapshot(getCol("excom_meetings"), (snap) => {
                window.excomMeetingsData = []; 
                let rawList = [];
                snap.forEach(d => rawList.push({ id: d.id, ...d.data() }));
                rawList.sort((a,b) => new Date(b.date).getTime() - new Date(a.date).getTime());
                
                let h = '';
                rawList.forEach(m => {
                    window.excomMeetingsData.push(m);
                    h += `
                    <div class="bg-black/30 border border-white/10 p-5 rounded-2xl mb-4 hover:border-white/20 transition-colors">
                        <div class="flex justify-between items-start mb-4">
                            <h4 class="font-bold text-white text-sm uppercase tracking-wide">${m.title}</h4>
                            <span class="text-[9px] text-white/50 font-mono">${m.date}</span>
                        </div>
                        <button onclick="printExcomMeeting('${m.id}')" class="text-[10px] btn-light py-3 rounded-xl uppercase tracking-widest font-bold w-full flex justify-center gap-2">
                            <i data-lucide="printer" class="w-3 h-3"></i> Print Report
                        </button>
                    </div>`;
                });
                if(document.getElementById('excomMeetingsList')) document.getElementById('excomMeetingsList').innerHTML = h;
                lucide.createIcons();
            }, (err) => console.error("ExCom Meetings Sync Error:", err));

            // Basic Counts
            onSnapshot(getCol("announcements"), s => safeSetText('totalAnnouncementsCount', s.size), err => console.error("Announcements Sync Error:", err));
            onSnapshot(getCol("eventForms"), s => { 
                safeSetText('activeFormsCount', s.size);
                let h=''; 
                s.forEach(d => { 
                    h += `
                    <div class="bg-black/30 border border-white/10 p-5 rounded-2xl flex justify-between items-center mb-3">
                        <span class="text-sm font-bold text-white flex items-center gap-3">
                            <i data-lucide="file-text" class="w-4 h-4 text-glow-purple"></i> ${d.data().title}
                        </span>
                        <button onclick="deleteDoc(window.doc(window.db,'artifacts','${appId}','public','data','eventForms','${d.id}'))" class="text-red-400 bg-red-500/10 hover:bg-red-500/20 px-4 py-2 rounded-lg text-[10px] font-bold uppercase tracking-widest transition-colors">
                            Delete
                        </button>
                    </div>`; 
                }); 
                if(document.getElementById('activeFormsList')) document.getElementById('activeFormsList').innerHTML = h; 
                lucide.createIcons(); 
            }, err => console.error("Forms Sync Error:", err));
        }

        // --- NEW FORM HANDLERS (FUNDS & QUESTS) ---
        document.getElementById('fundsForm').addEventListener('submit', async(e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button'); 
            btn.disabled = true; 
            btn.innerHTML = "Saving...";
            try {
                await addDoc(getCol("funds"), {
                    type: document.getElementById('fundType').value,
                    amount: parseFloat(document.getElementById('fundAmount').value),
                    desc: document.getElementById('fundDesc').value,
                    timestamp: Date.now()
                });
                window.showToast("Record Saved", "success");
                e.target.reset();
            } catch(e) { 
                window.showToast(e.message, "error"); 
            } finally { 
                btn.disabled = false; 
                btn.innerHTML = "Save Record"; 
            }
        });

        document.getElementById('questForm').addEventListener('submit', async(e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button'); 
            btn.disabled = true; 
            btn.innerHTML = "Publishing...";
            try {
                await addDoc(getCol("quests"), {
                    title: document.getElementById('questTitle').value,
                    reward: parseInt(document.getElementById('questReward').value),
                    desc: document.getElementById('questDesc').value,
                    timestamp: Date.now()
                });
                window.showToast("Quest published!", "success");
                e.target.reset();
            } catch(e) { 
                window.showToast(e.message, "error"); 
            } finally { 
                btn.disabled = false; 
                btn.innerHTML = "Publish Quest"; 
            }
        });

        // --- OTHER ADMIN HANDLERS ---
        window.deleteUser = async (id, name) => {
            if(!(await customConfirm(`WARNING: Are you sure you want to permanently delete '${name}'?`))) return;
            try { 
                await deleteDoc(getDocRef("users", id)); 
                await logActivity("User Deleted", name); 
                window.showToast("User deleted", "success");
            } catch(e) { window.showToast(e.message, "error"); }
        };
        
        window.toggleUserStatus = async (id, isDisabled) => {
            if(!(await customConfirm(`Are you sure you want to ${isDisabled ? 'Enable' : 'Disable'} this user?`))) return;
            try { 
                await updateDoc(getDocRef("users", id), { disabled: !isDisabled }); 
                await logActivity("User Status", `${isDisabled?'Enabled':'Disabled'} ${id}`); 
                window.showToast("User status updated", "success");
            } catch(e) { window.showToast(e.message, "error"); }
        };

        window.deleteDoc = deleteDoc;
        window.doc = doc;

        window.openExcomAttendanceModal = () => { 
            document.getElementById('excomMeetingTitle').value = ''; 
            document.getElementById('excomMeetingDate').value = ''; 
            document.getElementById('saveExcomBtn').disabled = false; 
            document.getElementById('saveExcomBtn').innerHTML = '<i data-lucide="save" class="w-4 h-4"></i> Save Log'; 
            document.querySelectorAll('.excom-status-select').forEach(s => s.value = 'Absent'); 
            document.getElementById('excomModal').classList.remove('hidden'); 
            lucide.createIcons(); 
        };

        window.submitExcomAttendance = async () => {
            const title = document.getElementById('excomMeetingTitle').value.trim(); 
            const date = document.getElementById('excomMeetingDate').value;
            
            if(!title || !date) return window.showToast("Fill meeting name and date.", "error");
            
            const attendanceRecords = Array.from(document.querySelectorAll('.excom-status-select')).map(sel => ({ 
                id: sel.dataset.id, 
                name: sel.dataset.name, 
                status: sel.value 
            }));
            
            const btn = document.getElementById('saveExcomBtn'); 
            btn.disabled = true; 
            btn.innerHTML = 'Saving...';
            
            try {
                await addDoc(getCol("excom_meetings"), { 
                    title: title, 
                    date: date, 
                    attendance: attendanceRecords, 
                    timestamp: Date.now(), 
                    loggedBy: window.currentUserEmail 
                }); 
                await logActivity("ExCom Logged", `Meeting: ${date}`); 
                window.showToast("Saved!", "success"); 
                document.getElementById('excomModal').classList.add('hidden');
            } catch(e) { 
                window.showToast(e.message, "error"); 
                btn.disabled = false; 
            }
        };

        window.submitAttendance = async () => {
            const eventName = document.getElementById('attendanceEventName').value.trim(); 
            const date = document.getElementById('attendanceDate').value;
            
            if(!eventName || !date) return window.showToast("Enter event name and date.", "error");
            
            const btn = document.getElementById('btnSaveAttendance'); 
            if(btn) { btn.disabled = true; btn.innerHTML = "Saving..."; }
            
            try {
                const batch = writeBatch(db); 
                let presentCount = 0; 
                let absentCount = 0;
                
                document.querySelectorAll('.att-checkbox').forEach(cb => { 
                    const uid = cb.value; 
                    const isPresent = cb.checked; 
                    const studentName = cb.dataset.name;
                    
                    batch.set(doc(getCol("attendance")), { 
                        eventName: eventName, 
                        date: date, 
                        uid: uid, 
                        studentName: studentName, 
                        status: isPresent ? 'Present' : 'Absent', 
                        timestamp: Date.now() 
                    });
                    
                    if(isPresent) { 
                        batch.update(getDocRef("users", uid), { points: increment(50) }); 
                        presentCount++; 
                    } else { 
                        absentCount++; 
                    }
                });
                
                await batch.commit(); 
                await logActivity("Marked Attendance", `Event: ${eventName}. Present: ${presentCount}, Absent: ${absentCount}`); 
                window.showToast(`Success! Saved ${presentCount} Present and ${absentCount} Absent.`, "success");
                
                document.querySelectorAll('.att-checkbox').forEach(cb => cb.checked = false); 
                document.getElementById('attendanceEventName').value = ''; 
                document.getElementById('attendanceDate').value = '';
            } catch(e) { 
                window.showToast(e.message, "error"); 
            } finally { 
                if(btn) { btn.disabled = false; btn.innerHTML = "Save List"; } 
            }
        };

        window.handleCertTemplate = (e) => { 
            window.certTemplateBase64 = true; 
            window.formCoverImageFile = e.target.files[0]; 
            document.getElementById('certFileName').textContent = e.target.files[0].name; 
        };

        window.issueCertificates = async () => {
            const eventName = document.getElementById('certEventName').value; 
            const issueDate = document.getElementById('certDate').value;
            const checkboxes = document.querySelectorAll('.cert-checkbox:checked'); 
            const btn = document.getElementById('certBtn');
            const statusEl = document.getElementById('certStatus');
            
            if(!eventName || !issueDate || !window.certTemplateBase64) return window.showToast("Fill all details and upload template.", "error");
            if(checkboxes.length === 0) return window.showToast("Select at least one student.", "error");
            
            btn.disabled = true; 
            btn.innerHTML = `Issuing...`;
            statusEl.classList.remove('hidden'); 
            statusEl.textContent = "Uploading template...";
            
            try {
                // MOCK UPLOAD FOR CANVAS
                const templateUrl = "mock_template_url.jpg";
                let count = 0;
                
                statusEl.textContent = `Assigning & Notifying...`;
                
                for(let cb of checkboxes) { 
                    const userEmail = cb.dataset.email; 
                    const userPhone = cb.dataset.phone; 
                    const userName = cb.dataset.name;
                    
                    await addDoc(getCol("certificates"), { 
                        userId: cb.value, 
                        userName: userName, 
                        eventName, 
                        date: issueDate, 
                        templateUrl, 
                        timestamp: Date.now() 
                    }); 
                    
                    if (userEmail && userEmail !== 'No Email') { 
                        await sendAutomatedEmail(userEmail, userName, eventName, templateUrl); 
                    }
                    if (userPhone && userPhone !== "No Phone") { 
                        const msg = `*MET'S IEDC | Certificate Issued* 🎓\n\nHi ${userName},\nCongratulations! Your certificate for *${eventName}* is ready.\n\nYou can view and download it directly from your IEDC Dashboard!`;
                        await sendAutomatedWhatsApp(userPhone, msg); 
                    }
                    count++; 
                }
                
                await logActivity("Issued Certificates", `Issued ${count} for ${eventName}`);
                statusEl.classList.replace('text-white', 'text-green-400'); 
                statusEl.innerHTML = `<i class="fas fa-check-circle mr-2"></i> Success! Sent ${count} emails & WhatsApps.`;
                
                setTimeout(() => { 
                    statusEl.classList.add('hidden'); 
                    statusEl.classList.replace('text-green-400', 'text-white'); 
                }, 4000);
                
                document.getElementById('certEventName').value = ''; 
                document.getElementById('certDate').value = ''; 
                window.certTemplateBase64 = null; 
                document.getElementById('certFileName').innerHTML = 'Upload a clean image design';
                checkboxes.forEach(c => c.checked = false);
            } catch(e) { 
                window.showToast("Error: " + e.message, "error"); 
                statusEl.classList.add('hidden');
            } finally { 
                btn.disabled = false; 
                btn.innerText = "Issue Certificates"; 
            }
        };

        window.approveProject = async (projectId, userId, userPhone, projectTitle) => {
            if(!(await customConfirm("Approve project and award 100 points?"))) return;
            try {
                await updateDoc(getDocRef("projects", projectId), { status: "Approved" });
                await updateDoc(getDocRef("users", userId), { points: increment(100) });
                await logActivity("Project Approved", `Approved: ${projectTitle}`);
                
                if(userPhone && userPhone !== "Unknown") {
                    const msg = `*MET'S IEDC | Project Approved* 🚀\n\nGreat news! Your project pitch for *${projectTitle}* has been officially approved.\n\n⚡ *+100 Innovation Points* have been added to your dashboard!`;
                    await sendAutomatedWhatsApp(userPhone, msg);
                    window.showToast("Approved! Points added and WhatsApp sent.", "success");
                } else { 
                    window.showToast("Approved! Points added. (No phone number)", "success"); 
                }
            } catch(err) { window.showToast("Error: " + err.message, "error"); }
        };

        window.rejectProject = async (projectId) => {
            if(!(await customConfirm("Reject this project?"))) return;
            try { 
                await updateDoc(getDocRef("projects", projectId), { status: "Rejected" }); 
                await logActivity("Project Rejected", `Rejected ID: ${projectId}`); 
            } catch(err) { window.showToast(err.message, "error"); }
        };

        window.toggleItemStatus = async (id, status) => { 
            await updateDoc(getDocRef("inventory", id), { status: status }); 
            await logActivity("Inventory Update", `Changed item status to ${status}`); 
        };

        window.handleNewsImage = (e) => { 
            window.newsImageFile = e.target.files[0]; 
            document.getElementById('newsFileName').textContent = e.target.files[0].name; 
        };
        
        window.handleGalleryImages = (e) => { 
            window.galleryImages = Array.from(e.target.files); 
            document.getElementById('galleryFileName').textContent = `${window.galleryImages.length} files selected`; 
        };

    </script>
</body>
</html>
