<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | MET'S IEDC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Inter', 'sans-serif'],
                        display: ['Montserrat', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f1115; color: #e2e8f0; }
        
        /* Subtle radar pulse animation for the offline icon */
        .radar-pulse {
            position: relative;
        }
        .radar-pulse::before, .radar-pulse::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100%; height: 100%;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            z-index: -1;
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        .radar-pulse::after {
            animation-delay: 1s;
        }
        
        @keyframes pulse-ring {
            0% { width: 60px; height: 60px; opacity: 1; }
            100% { width: 200px; height: 200px; opacity: 0; }
        }
    </style>
</head>
<body class="font-sans antialiased h-screen flex flex-col items-center justify-center relative overflow-hidden selection:bg-white selection:text-black">
    
    <div class="absolute inset-0 bg-gradient-to-b from-[#181b21] to-[#0f1115] z-0"></div>

    <div class="relative z-10 text-center px-6 max-w-lg mx-auto flex flex-col items-center">
        <div class="w-20 h-20 rounded-full bg-white/5 border border-white/10 flex items-center justify-center mb-10 radar-pulse">
            <i class="fas fa-wifi text-2xl text-white/40 relative">
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-8 h-[2px] bg-white rotate-45"></div>
            </i>
        </div>

        <h1 class="text-4xl md:text-5xl font-display font-black text-white mb-4 tracking-tight uppercase">Connection Lost</h1>
        
        <p class="text-white/50 font-light mb-12 text-sm leading-relaxed">
            It looks like you have gone off the grid. The MET'S IEDC Innovation Hub requires an active connection to synthesize new data.
        </p>

        <button onclick="window.location.reload()" class="px-8 py-4 bg-white text-black hover:bg-gray-200 rounded text-xs tracking-[0.2em] uppercase font-bold transition-all hover:-translate-y-1 hover:shadow-lg hover:shadow-white/20 flex items-center gap-3">
            <i class="fas fa-sync-alt"></i> Reconnect
        </button>

        <a href="index.html" class="mt-8 text-[10px] uppercase tracking-[0.2em] text-white/40 hover:text-white transition-colors">
            Return to Cached Home
        </a>
    </div>

</body>
</html>
