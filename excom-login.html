    <style>
        body {

        /* Glassmorphism Utilities */
        .glass-panel {
            background: linear-gradient(145deg, rgba(30, 30, 35, 0.8) 0%, rgba(15, 15, 20, 0.6) 100%);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.02), 0 20px 50px rgba(0,0,0,0.6);
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .glass-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            z-index: 1;
        }

        /* Input styling */
        .glass-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(147, 51, 234, 0.5); /* Purple glow for excom */
            outline: none;
            box-shadow: 0 0 15px rgba(147, 51, 234, 0.2);
        }
        .glass-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        /* Button Styling */
        .btn-light {
            background: #ffffff;
            color: #050505;
            transition: all 0.3s ease;
        }
        .btn-light:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255,255,255,0.2);
        }
        .btn-light:disabled {
            opacity: 0.7;
            transform: none;
            cursor: not-allowed;
        }

        /* Loading Spinner */
        .spinner {
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top: 2px solid #000;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Scrollbar */

        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        // --- BACKGROUND CANVAS ANIMATION (Particle Network) ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 1.2;
                this.vy = (Math.random() - 0.5) * 1.2;
                this.radius = Math.random() * 2 + 0.5;
                // ExCom Theme Colors: Purple, Blue, and White
                const colors = ['#9333ea', '#2563eb', '#ffffff'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                
                if (this.x < 0 || this.x > width) this.vx = -this.vx;
                if (this.y < 0 || this.y > height) this.vy = -this.vy;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0; 
            }
        }

        const particleCount = window.innerWidth < 768 ? 40 : 100;
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < 130) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(255, 255, 255, ${0.15 - (dist / 130) * 0.15})`;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // IMPORTANT: Replace with your actual Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyAIn9hB7Hx4Nwwk5Ar9bE3tFuo40VkBcc8",
            authDomain: "metsiedc-3010e.firebaseapp.com",
            databaseURL: "https://metsiedc-3010e-default-rtdb.firebaseio.com",
            projectId: "metsiedc-3010e",
            storageBucket: "metsiedc-3010e.firebasestorage.app",
            messagingSenderId: "954403413150",
            appId: "1:954403413150:web:2523a3377f15a3d6002f8f"
        };

        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (e) {
            console.error("Firebase Init Error:", e);
            alert("Error initializing Firebase. Check console.");
        }

        const loginForm = document.getElementById('excomLoginForm');
        const loginBtn = document.getElementById('loginBtn');
        const loginBtnText = document.getElementById('loginBtnText');
        const loginSpinner = document.getElementById('loginSpinner');
        const loginIcon = document.getElementById('loginIcon');
        const loginError = document.getElementById('loginError');
        const loginErrorText = document.getElementById('loginErrorText');

        // Toggle Password Visibility
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', function() {
                const input = this.parentElement.querySelector('input');
                const icon = this.querySelector('i');
                input.type = input.type === 'password' ? 'text' : 'password';
                icon.classList.toggle('fa-eye'); icon.classList.toggle('fa-eye-slash');
            });
        });

        onAuthStateChanged(auth, async (user) => {
            // Keep session active, let the form submission handle routing
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('excomEmail').value.trim();
            const password = document.getElementById('excomPassword').value;

            if (!email || !password) {
                showError("Please enter both email and password.");
                return;
            }

            loginBtn.disabled = true;
            loginBtnText.textContent = "Verifying...";
            if(loginSpinner) loginSpinner.classList.remove('hidden');
            if(loginIcon) loginIcon.classList.add('hidden');
            loginError.classList.add('hidden');

            try {
                // 1. Authenticate with Firebase
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. Fetch the user's role from Firestore
                const userDocRef = doc(db, "users", user.uid);
                const userDoc = await getDoc(userDocRef);
                
                if (userDoc.exists()) {
                    const userData = userDoc.data();

                    // 3. Check Role (Allow 'excom' or 'admin' to use this portal)
                    if (userData.role === 'excom' || userData.role === 'admin') {
                        try {
                            await addDoc(collection(db, "logs"), {
                                action: "ExCom Login",
                                details: "Successful login to ExCom Portal",
                                admin: email,
                                timestamp: Date.now()
                            });
                        } catch (err) {} // ignore logging errors

                        // 4. Redirect to ExCom Dashboard
                        window.location.href = 'excom-dashboard.html'; 
                    } else {
                        // If they are just a student, deny access
                        try {
                            await addDoc(collection(db, "logs"), {
                                action: "Unauthorized Access",
                                details: "Student attempted to login to ExCom Portal",
                                admin: email,
                                timestamp: Date.now()
                            });
                        } catch (err) {} 

                        throw new Error("Access Denied: Your account does not have Committee privileges.");
                    }
                } else {
                    throw new Error("Access Denied: User profile not found in database.");
                }

            } catch (error) {
                console.error("Login Error:", error);
                
                // Force sign out if they were rejected based on role
                if (error.message.includes("Access Denied")) {
                    await signOut(auth);
                }

                let msg = "Authentication failed: " + error.message;
                if(error.code === 'auth/invalid-credential') msg = "Invalid email or password.";
                if(error.code === 'auth/user-not-found') msg = "User not found.";
                if(error.code === 'auth/wrong-password') msg = "Invalid password.";
                
                showError(msg);
                
                // Reset Button UI
                loginBtn.disabled = false;
                loginBtnText.textContent = "Access Dashboard";
                if(loginSpinner) loginSpinner.classList.add('hidden');
                if(loginIcon) loginIcon.classList.remove('hidden');
            }
        });

        function showError(msg) {
            loginErrorText.textContent = msg;
            loginError.classList.remove('hidden');
        }
    </script>
